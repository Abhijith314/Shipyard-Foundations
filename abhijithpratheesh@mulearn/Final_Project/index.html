<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scalable Web App</title>
    <style>
        :root {
            --primary: #2563eb; 
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --status-bg: #dcfce7;
            --status-text: #166534;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .card {
            background: var(--card-bg);
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            max-width: 450px;
            width: 90%;
            text-align: center;
            border: 1px solid #f1f5f9;
        }

        .main-heading {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-heading {
            color: var(--text-sub);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: var(--status-bg);
            color: var(--status-text);
            padding: 0.5rem 1.2rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .footer {
            border-top: 1px solid #f1f5f9;
            padding-top: 1.5rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-sub);
            line-height: 1.6;
        }

        .muid-badge {
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="main-heading">Scalable Web App</h1>
        <p class="sub-heading">Docker & Kubernetes Foundations</p>

        <div class="status-pill">
            <span class="dot"></span>
            System Online: Pods are Running
        </div>

        <div class="footer">
            Built by <strong>Abhijith Pratheesh</strong><br>
            MUID: <span class="muid-badge">abhijithpratheesh@mulearn</span>
        </div>
    </div>
</body>
</html>
