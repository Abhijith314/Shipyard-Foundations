apiVersion: apps/v1
kind: Deployment
metadata:
  name: final-web-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: my-web-container
        image: my-web-app:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        env:
        - name: STUDENT_NAME
          value: "Abhijith Pratheesh"